<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1a1622" />
  <title>404 · Didrik</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    /* Self-contained so the 404 page doesn't depend on the SPA bundle loading. */
    html, body { height: 100%; margin: 0; }
    body {
      background:
        radial-gradient(ellipse 70% 55% at 82% 12%,
          rgba(255, 255, 255, 0.14) 0%,
          rgba(255, 255, 255, 0.03) 35%,
          transparent 70%),
        linear-gradient(160deg, #1a1330 0%, #2a1f4a 45%, #4a3970 100%);
      color: rgba(255, 255, 255, 0.92);
      font-family: "Helvetica Neue", Helvetica, "Inter", system-ui, -apple-system, sans-serif;
      font-weight: 300;
      letter-spacing: 0.01em;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      overflow: hidden;
    }
    .num {
      font-size: 120px;
      font-weight: 200;
      letter-spacing: -0.04em;
      margin: 0 0 4px;
      line-height: 1;
      text-shadow: 0 0 24px rgba(255, 255, 255, 0.18);
    }
    .eyebrow {
      font-size: 10px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.36);
      margin-bottom: 28px;
    }
    p {
      color: rgba(255, 255, 255, 0.62);
      max-width: 36ch;
      font-size: 15px;
      line-height: 1.5;
      margin: 0;
    }
    a.back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      margin-top: 32px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 14px;
      color: #fff;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-decoration: none;
      transition: background 220ms ease, border-color 220ms ease;
    }
    a.back:hover {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.28);
    }
    a.back::before { content: "◁"; font-size: 9px; opacity: 0.7; }

    @media (max-width: 600px) {
      .num { font-size: 88px; }
      p { font-size: 14px; }
    }
  </style>
</head>
<body>
  <h1 class="num">404</h1>
  <div class="eyebrow">Page not found</div>
  <p>This page is somewhere else, or never was. The home page is still on the table.</p>
  <a class="back" href="/">Back home</a>
</body>
</html>
